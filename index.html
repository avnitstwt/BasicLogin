<!DOCTYPE html>
<html lang="en" class="h-full w-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="./src/output.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body class="h-full w-full">
    <div class="page h-full w-full bg-pink-500 flex justify-center items-center">
        <div
            class="box min-h-[60vh] w-[90%] max-w-[350px] rounded-2xl bg-white flex flex-col items-center py-8 shadow-2xl">

            <div class="Login text-center text-3xl font-bold mb-8">
                Login Form
            </div>

            <div class="logos flex w-[80%] justify-between gap-3 mb-6">
                <div
                    class="fb flex-1 py-2 rounded-md text-white bg-[#4341a6] flex items-center justify-center text-base cursor-pointer hover:opacity-90 transition">
                    <i class="ri-facebook-fill mr-1"></i> Facebook
                </div>
                <div
                    class="tw flex-1 py-2 rounded-md text-white bg-[#7070f8] flex items-center justify-center text-base cursor-pointer hover:opacity-90 transition">
                    <i class="ri-twitter-fill mr-1"></i> Twitter
                </div>
            </div>

            <div class="inp flex flex-col w-full items-center gap-4">

                <div
                    class="sing flex items-center border border-gray-300 rounded-md w-[80%] px-3 py-2 focus-within:border-pink-500 transition">
                    <label for="em"> <i class="ri-user-fill text-gray-400 mr-2"></i> </label>
                    <input id="em" type="text" placeholder="Email or Phone"
                        class="w-full outline-none text-sm bg-transparent">
                </div>

                <div
                    class="secon flex items-center border border-gray-300 rounded-md w-[80%] px-3 py-2 focus-within:border-pink-500 transition">
                    <label for="ps"><i class="ri-lock-line text-gray-400 mr-2"></i></label>
                    <input id="ps" type="password" placeholder="Password"
                        class="w-full outline-none text-sm bg-transparent">
                </div>

                <div class="w-[80%] flex justify-between items-center ">
                    <div class="rem text-gray-600">
                        <div class="flex items-center gap-1">
                            <input type="checkbox" name="" id="rem">
                            <label for="rem">Remember me</label>
                        </div>
                    </div>
                    <a href="#" class="text-xs text-pink-500 hover:underline">Forgot password?</a>
                </div>

                <button
                    class="w-[80%] bg-pink-500 text-white py-2 rounded-md font-semibold mt-2 hover:bg-pink-600 transition">
                    LOGIN
                </button>

                <div class="mt-4 text-gray-600 text-sm">
                    Not a member? <a href="#" class="text-pink-400 hover:underline">Signup now</a>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
